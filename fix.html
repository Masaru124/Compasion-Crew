            + '</div>'
            + '</div>'

            + '<div class="faq-builder">'
            + '<div style="font-family:Fraunces,serif;font-size:14px;margin-bottom:10px;">FAQPage schema builder</div>'
            + '<div id="faq-pairs"></div>'
            + '<div class="actions"><button class="btn ghost" id="add-faq">+ Add question</button><button class="btn" id="gen-schema">Generate schema</button></div>'
            + '<pre class="schema-out" id="schema-out" style="margin-top:10px; display:none;"></pre>'
            + '<div class="actions" style="margin-top:8px;"><button class="btn ghost" id="copy-schema" style="display:none;">Copy JSON-LD</button><span class="copied-flash" id="schema-flash">Copied</span></div>'
            + '</div>'
            + '</div>'

            + '<div class="footnote">Connect a working Google Search Console property (with query access) and DataForSEO to replace the diagnostics above with live, trended numbers. Nothing in this console is invented — empty or estimated states are labeled as such.</div>'
            + '</div>';

        root.innerHTML = html;

        function renderCluster(name, desc, items) {
            var rows = items.length ? items.map(function (it) {
                return '<div class="qrow"><span class="qtext">' + it.q + '</span><span class="qmeta">pos ' + it.pos + ' · ' + it.impr + ' impr</span></div>';
            }).join('') : '<div class="badge empty">No real queries in this cluster yet</div>';
            return '<div class="cluster"><h3>' + name + '</h3><div class="desc">' + desc + '</div>' + rows + '</div>';
        }

        // Refresher table
        var rbody = document.getElementById('refresher-body');
        FLAGGED_PAGES.sort(function (a, b) {
            var order = { critical: 0, high: 1, medium: 2 };
            if (order[a.severity] !== order[b.severity]) return order[a.severity] - order[b.severity];
            return b.impr - a.impr;
        });
        FLAGGED_PAGES.forEach(function (p, i) {
            var tr = document.createElement('tr');
            tr.className = 'row-expand';
            tr.innerHTML = '<td class="page-url">' + p.url + '</td>'
                + '<td class="pos">' + p.pos + '</td>'
                + '<td class="pos">' + p.impr + '</td>'
                + '<td><span class="sev ' + p.severity + '">● ' + p.severity + '</span></td>'
                + '<td>' + (p.fixed ? '<span class="sev medium" style="color:#4f9d82">✓ rewritten</span>' : '<span class="sev medium">queued</span>') + '</td>';
            rbody.appendChild(tr);

            var detail = document.createElement('tr');
            detail.className = 'row-detail';
            detail.id = 'detail-' + i;
            var issuesHtml = '<ul class="issue-list">' + p.issues.map(function (x) { return '<li>' + x + '</li>'; }).join('') + '</ul>';
            var changeHtml = '<ul class="changelog">' + p.changelog.map(function (x) { return '<li>' + x + '</li>'; }).join('') + '</ul>';
            detail.innerHTML = '<td colspan="5">'
                + '<div style="font-size:11px; color:var(--muted); margin-bottom:4px;">WHAT\'S DRAGGING IT</div>' + issuesHtml
                + '<div style="font-size:11px; color:var(--muted); margin:10px 0 4px;">' + (p.fixed ? 'CHANGELOG (already shipped)' : 'PLANNED FIX') + '</div>' + changeHtml
                + '<div class="actions"><button class="btn ghost copy-fix" data-url="' + p.url + '" data-issues="' + p.issues.join(' | ') + '">Copy fix prompt</button></div>'
                + '</td>';
            rbody.appendChild(detail);

            tr.addEventListener('click', function () {
                detail.classList.toggle('open');
            });
        });

        root.querySelectorAll('.copy-fix').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                var url = btn.getAttribute('data-url');
                var issues = btn.getAttribute('data-issues');
                var prompt = 'Refresh ' + url + ' on compassioncrew.in. Issues to fix: ' + issues + '. Give me ready-to-publish rewritten copy, a changelog, new title/meta, and FAQ schema, in brand voice. Do not reintroduce NGO/80G language -- Compassion Crew is not a registered NGO.';
                if (window.sendPrompt) { window.sendPrompt(prompt); }
                else { navigator.clipboard.writeText(prompt); }
            });
        });

        // Tabs
        root.querySelectorAll('.tab').forEach(function (tab) {
            tab.addEventListener('click', function () {
                root.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
                root.querySelectorAll('.panel').forEach(function (p) { p.classList.remove('active'); });
                tab.classList.add('active');
                document.getElementById('panel-' + tab.getAttribute('data-tab')).classList.add('active');
            });
        });

        // Draft / copy brief buttons
        document.getElementById('draft-btn').addEventListener('click', function () {
            var prompt = 'Draft a new page for compassioncrew.in targeting "ngos in bangalore to volunteer". Use seo-content, clear E-E-A-T, brand voice. Position Compassion Crew as the community volunteer platform answering this search -- not as an NGO. Give me title, meta, outline, full draft, target keyword, internal links, and schema. Compassion Crew is not a registered NGO -- do not use 80G/tax-deductible language or NGO self-labeling.';
            if (window.sendPrompt) { window.sendPrompt(prompt); }
        });
        document.getElementById('copy-opp-btn').addEventListener('click', function () {
            navigator.clipboard.writeText('Opportunity: "' + BEST_OPPORTUNITY.keyword + '" -- ' + BEST_OPPORTUNITY.why);
        });

        // Quotable scorer
        function scorePassage(text) {
            var words = text.trim().split(/\s+/).filter(Boolean);
            var wc = words.length;
            var checks = [];

            var lenOk = wc >= 40 && wc <= 60;
            checks.push({ label: wc + ' words (target 40–60)', pass: lenOk });

            var questionLed = /^(what|how|why|when|where|who|which|is|are|does|do|can)\b/i.test(text.trim());
            checks.push({ label: questionLed ? 'Reads as question-led or directly answers one' : 'Not clearly question-led', pass: questionLed });

            var hasNumber = /\d/.test(text);
            checks.push({ label: hasNumber ? 'Contains a concrete, checkable claim (number/figure)' : 'No concrete number or checkable claim found', pass: hasNumber });

            var pronounRefs = (text.match(/\b(it|this|that|these|those)\b/gi) || []).length;
            var selfContained = pronounRefs <= 2;
            checks.push({ label: selfContained ? 'Reads as self-contained' : 'Leans on outside context (too many it/this/that references)', pass: selfContained });

            var sentences = text.split(/(?<=[.!?])\s+/).filter(Boolean);
            var oneClaim = sentences.length <= 3;
            checks.push({ label: sentences.length + ' sentence(s) — concise enough to quote whole', pass: oneClaim });

            var score = Math.round((checks.filter(function (c) { return c.pass; }).length / checks.length) * 100);
            return { score: score, checks: checks };
        }

        function renderScore() {
            var text = document.getElementById('quotable-input').value;
            var result = scorePassage(text);
            document.getElementById('score-num').textContent = result.score;
            var checksEl = document.getElementById('checks');
            checksEl.innerHTML = result.checks.map(function (c) {
                return '<div class="check"><span class="mark ' + (c.pass ? 'pass' : 'fail') + '">' + (c.pass ? '✓' : '✕') + '</span>' + c.label + '</div>';
            }).join('');
        }
        document.getElementById('score-btn').addEventListener('click', renderScore);
        renderScore();

        // FAQ builder
        var faqCount = 0;
        function addFaqPair(q, a) {
            faqCount++;
            var div = document.createElement('div');
            div.className = 'faq-pair';
            div.innerHTML = '<input type="text" placeholder="Question" class="faq-q" value="' + (q || '') + '"/>'
                + '<textarea placeholder="Answer (40-60 words, self-contained)" class="faq-a">' + (a || '') + '</textarea>';
            document.getElementById('faq-pairs').appendChild(div);
        }
        addFaqPair('Is my donation to Compassion Crew tax-deductible?', 'No. Compassion Crew is a community-driven social impact platform, not a registered NGO, so donations are not currently eligible for 80G tax deduction.');
        addFaqPair('', '');

        document.getElementById('add-faq').addEventListener('click', function () { addFaqPair(); });

        document.getElementById('gen-schema').addEventListener('click', function () {
            var pairs = Array.from(document.querySelectorAll('.faq-pair')).map(function (el) {
                return {
                    q: el.querySelector('.faq-q').value.trim(),
                    a: el.querySelector('.faq-a').value.trim()
                };
            }).filter(function (p) { return p.q && p.a; });

            var schema = {
                "@context": "https://schema.org",
                "@type": "FAQPage",
                "mainEntity": pairs.map(function (p) {
                    return {
                        "@type": "Question",
                        "name": p.q,
                        "acceptedAnswer": { "@type": "Answer", "text": p.a }
                    };
                })
            };

            var out = document.getElementById('schema-out');
            out.textContent = JSON.stringify(schema, null, 2);
            out.style.display = 'block';
            document.getElementById('copy-schema').style.display = 'inline-block';
        });

        document.getElementById('copy-schema').addEventListener('click', function () {
            navigator.clipboard.writeText(document.getElementById('schema-out').textContent);
            var flash = document.getElementById('schema-flash');
            flash.classList.add('show');
            setTimeout(function () { flash.classList.remove('show'); }, 1200);
        });

    })();
</script>
